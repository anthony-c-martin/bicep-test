name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  USE_NIGHTLY: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Set up Node
      uses: actions/setup-node@v7
      with:
        node-version: 24

    - name: npm ci
      run: npm ci

    - name: npm test
      run: npm test